services:
  python_server:
    image: python:3.14.5-slim
    container_name: python_server
    volumes:
      - ./raw:/raw
      - ./wisdm-dataset:/wisdm-dataset
      - ./python_scripts:/python_scripts
    command: "pip install paho-mqtt && python3 /python_scripts/publicador_wisdm.py && /bin/bash"

networks:
  practica3_network:
    name: practica3_network
    driver: bridge
